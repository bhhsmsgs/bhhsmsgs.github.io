<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bhhsmsgs — Submit</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080809;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(140,185,255,0.35);
      --accent: #8cb9ff;
      --accent-dim: rgba(140,185,255,0.1);
      --text: #eef0f4;
      --muted: rgba(238,240,244,0.42);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,9,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .nav-logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
    }
    .nav-logo span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-pill {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
    }
    .btn-ghost {
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
    }
    /* background dot glow */
    main::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(140,185,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .submit-card {
      position: relative;
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px;
      backdrop-filter: blur(8px);
    }

    .card-header {
      margin-bottom: 28px;
    }
    .card-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }
    .card-header p {
      font-size: 13px;
      color: var(--muted);
    }

    .counter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .counter-badge {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(140,185,255,0.1);
      border: 1px solid rgba(140,185,255,0.2);
      border-radius: 6px;
      padding: 4px 10px;
      letter-spacing: 0.06em;
    }
    .counter-label {
      font-size: 12px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: var(--border-active);
      background: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(140,185,255,0.07);
    }
    textarea::placeholder { color: rgba(255,255,255,0.18); }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }
    .char-count.warn { color: #ffaa5e; }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .btn-submit {
      flex: 1;
      padding: 13px;
      background: var(--accent);
      color: #08080f;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(140,185,255,0.18);
    }
    .btn-submit:hover { opacity: 0.88; box-shadow: 0 4px 32px rgba(140,185,255,0.3); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status-msg {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    .status-msg.show { display: block; }
    .status-msg.ok   { background: rgba(140,185,255,0.1); color: var(--accent); border: 1px solid rgba(140,185,255,0.2); }
    .status-msg.err  { background: rgba(255,100,100,0.08); color: #ff7b7b; border: 1px solid rgba(255,100,100,0.2); }

    /* divider line like the banner */
    .accent-line {
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, rgba(140,185,255,0.1) 100%);
      border-radius: 2px;
      margin-bottom: 32px;
      width: 60px;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="bhhsmsgs_logo.png" alt="logo">
      <span>bhhsmsgs</span>
    </a>
    <div class="nav-right">
      <span class="user-pill" id="user-email">—</span>
      <button class="btn-ghost" onclick="logOut()">Log Out</button>
    </div>
  </nav>

  <main>
    <div class="submit-card">
      <div class="card-header">
        <h1>Submit a Message</h1>
        <div class="accent-line"></div>
        <p>Approved messages are broadcast to Discord and pooled for the next community Reel.</p>
      </div>

      <div class="counter-row">
        <span class="counter-badge" id="count-badge">— / 5</span>
        <span class="counter-label">messages queued toward next Reel</span>
      </div>

      <textarea id="message-input" placeholder="Say something to the community..." maxlength="280" oninput="updateCount()"></textarea>
      <p class="char-count" id="char-count">0 / 280</p>

      <div class="actions">
        <button class="btn-submit" id="submit-btn" onclick="submitMessage()">Submit</button>
      </div>

      <div class="status-msg" id="status-msg"></div>
    </div>
  </main>

  <script>
    const { createClient } = supabase;
    const sb = createClient('https://betegxuivbdklzasqywt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldGVneHVpdmJka2x6YXNxeXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTY3MDIsImV4cCI6MjA5NTc3MjcwMn0.yTEZOhtfpB6Ifk5SF99ZBl-ETiPAaQ--XM3DZnQwG1A');

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      document.getElementById('user-email').textContent = session.user.email;
    })();

    function updateCount() {
      const val = document.getElementById('message-input').value.length;
      const el  = document.getElementById('char-count');
      el.textContent = `${val} / 280`;
      el.className = 'char-count' + (val > 240 ? ' warn' : '');
    }

    function showStatus(text, type) {
      const el = document.getElementById('status-msg');
      el.textContent = text;
      el.className = 'status-msg show ' + type;
    }

    async function submitMessage() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }

      const message = document.getElementById('message-input').value.trim();
      if (!message) { showStatus('Write something first.', 'err'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('https://bhhsmsgs-backend.onrender.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, token: session.access_token }),
        });
        const data = await res.json();
        if (data.result === 'approved') {
          showStatus('✓ Message submitted and broadcast to Discord!', 'ok');
          document.getElementById('message-input').value = '';
          updateCount();
        } else {
          showStatus('Message did not pass moderation. Try rephrasing.', 'err');
        }
      } catch {
        showStatus('Network error — please try again.', 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    }

    async function logOut() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
