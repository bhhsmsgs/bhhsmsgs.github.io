<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bhhsmsgs</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080809;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(140,185,255,0.35);
      --accent: #8cb9ff;
      --accent-dim: rgba(140,185,255,0.1);
      --accent-glow: rgba(140,185,255,0.06);
      --text: #eef0f4;
      --muted: rgba(238,240,244,0.42);
      --white-glow: rgba(255,255,255,0.55);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }
    .banner-wrap {
      position: absolute;
      inset: 0;
    }
    .banner-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.72;
      filter: brightness(0.7) contrast(1.1);
    }
    /* scanline overlay */
    .banner-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
    }
    /* bottom fade */
    .left::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(transparent, var(--bg));
      pointer-events: none;
      z-index: 1;
    }
    .left-footer {
      position: relative;
      z-index: 2;
      padding: 32px 36px;
    }
    .left-footer p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── RIGHT PANEL ── */
    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      background: linear-gradient(160deg, rgba(140,185,255,0.03) 0%, transparent 60%);
      border-left: 1px solid var(--border);
      position: relative;
    }
    /* corner dot grid */
    .right::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 180px; height: 180px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 14px 14px;
      mask-image: radial-gradient(ellipse at top right, black 40%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      margin-bottom: 36px;
      text-align: center;
    }
    .logo-wrap img {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: brightness(1.1) drop-shadow(0 0 18px rgba(255,255,255,0.25));
    }

    .form-box {
      width: 100%;
      max-width: 360px;
    }

    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: #08080f;
      letter-spacing: 0.08em;
    }
    .tab:not(.active):hover { color: var(--text); }

    .form { display: none; flex-direction: column; gap: 16px; }
    .form.visible { display: flex; }

    .field { display: flex; flex-direction: column; gap: 7px; }
    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--border-active);
      background: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(140,185,255,0.08);
    }
    input::placeholder { color: rgba(255,255,255,0.18); }

    .btn {
      margin-top: 4px;
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #08080f;
      border: none;
      border-radius: 9px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(140,185,255,0.2);
    }
    .btn:hover { opacity: 0.88; box-shadow: 0 4px 32px rgba(140,185,255,0.32); }
    .btn:active { transform: scale(0.98); }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      line-height: 1.5;
    }
    .msg.err  { color: #ff7b7b; }
    .msg.ok   { color: var(--accent); }

    /* mobile */
    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { min-height: 100vh; border-left: none; }
    }
  </style>
</head>
<body>

  <!-- LEFT: banner -->
  <div class="left">
    <div class="banner-wrap">
      <img src="bhhsmsgs_half.png" alt="bhhsmsgs banner">
    </div>
    <div class="left-footer">
      <p>Community Pipeline</p>
    </div>
  </div>

  <!-- RIGHT: login form -->
  <div class="right">
    <div class="form-box">
      <div class="logo-wrap">
        <img src="bhhsmsgs_logo.png" alt="bhhsmsgs logo">
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Log In</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div class="form visible" id="form-login">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="logIn()">Enter</button>
      </div>

      <div class="form" id="form-signup">
        <div class="field">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="signUp()">Create Account</button>
      </div>

      <p class="msg" id="message"></p>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient('https://betegxuivbdklzasqywt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldGVneHVpdmJka2x6YXNxeXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTY3MDIsImV4cCI6MjA5NTc3MjcwMn0.yTEZOhtfpB6Ifk5SF99ZBl-ETiPAaQ--XM3DZnQwG1A');

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('visible'));
      document.getElementById('form-' + tab).classList.add('visible');
      const idx = tab === 'login' ? 0 : 1;
      document.querySelectorAll('.tab')[idx].classList.add('active');
      setMsg('');
    }
    function setMsg(text, type = '') {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    async function signUp() {
      const email = document.getElementById('signup-email').value;
      const pass  = document.getElementById('signup-password').value;
      if (!email || !pass) { setMsg('Fill in both fields.', 'err'); return; }
      const { error } = await sb.auth.signUp({ email, password: pass });
      if (error) { setMsg(error.message, 'err'); return; }
      setMsg('Check your email to confirm your account!', 'ok');
    }
    async function logIn() {
      const email = document.getElementById('login-email').value;
      const pass  = document.getElementById('login-password').value;
      if (!email || !pass) { setMsg('Fill in both fields.', 'err'); return; }
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { setMsg(error.message, 'err'); return; }
      const { data: profile } = await sb.from('profiles').select('is_approved,is_admin').eq('id', data.user.id).single();
      if (!profile?.is_approved) {
        setMsg('Your account is pending admin approval.', 'err');
        await sb.auth.signOut(); return;
      }
      window.location.href = profile.is_admin ? 'admin.html' : 'dashboard.html';
    }
  </script>
</body>
</html>
