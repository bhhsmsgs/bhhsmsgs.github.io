<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bhhsmsgs — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080809;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(140,185,255,0.35);
      --accent: #8cb9ff;
      --accent-dim: rgba(140,185,255,0.1);
      --text: #eef0f4;
      --muted: rgba(238,240,244,0.42);
      --danger: #ff6b6b;
      --success: #6bffb8;
    }
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,9,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo img { width: 34px; height: 34px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
    .nav-logo span { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--text); }
    .admin-badge {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      color: var(--accent); background: rgba(140,185,255,0.12);
      border: 1px solid rgba(140,185,255,0.25); border-radius: 4px;
      padding: 3px 8px; text-transform: uppercase;
    }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn-ghost {
      font-size: 13px; color: var(--muted); background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .page { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

    .page-header { margin-bottom: 40px; }
    .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; line-height: 1; margin-bottom: 6px; }
    .accent-line { height: 2px; background: linear-gradient(90deg, var(--accent) 0%, transparent 100%); border-radius: 2px; width: 48px; margin-bottom: 10px; }
    .page-header p { font-size: 13px; color: var(--muted); }

    /* stat cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 40px; }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
    }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; color: var(--accent); line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    /* sections */
    .section { margin-bottom: 40px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-head h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; }
    .section-head span { font-size: 12px; color: var(--muted); }

    /* pending users */
    .user-list { display: flex; flex-direction: column; gap: 8px; }
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .user-row:hover { border-color: rgba(255,255,255,0.14); }
    .user-info { display: flex; flex-direction: column; gap: 3px; }
    .user-email-txt { font-size: 14px; font-weight: 500; }
    .user-date { font-size: 11px; color: var(--muted); }
    .btn-approve {
      font-size: 12px; font-weight: 500; letter-spacing: 0.06em;
      color: #08080f; background: var(--accent);
      border: none; border-radius: 7px;
      padding: 7px 16px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-approve:hover { opacity: 0.82; }
    .empty-state { font-size: 13px; color: var(--muted); padding: 20px 0; text-align: center; }

    /* message table */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.03); }
    th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .msg-text { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pill {
      display: inline-block; font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .pill-approved  { background: rgba(107,255,184,0.12); color: #6bffb8; }
    .pill-rejected  { background: rgba(255,107,107,0.12); color: #ff7b7b; }
    .pill-pending   { background: rgba(255,200,80,0.12);  color: #ffcc50; }
    .pill-posted    { background: rgba(140,185,255,0.12); color: var(--accent); }

    .btn-csv {
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--accent); background: rgba(140,185,255,0.1);
      border: 1px solid rgba(140,185,255,0.25); border-radius: 8px;
      padding: 8px 16px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-csv:hover { background: rgba(140,185,255,0.18); }
  </style>
</head>
<body>

  <nav>
    <div style="display:flex;align-items:center;gap:14px;">
      <a class="nav-logo" href="index.html">
        <img src="bhhsmsgs_logo.png" alt="logo">
        <span>bhhsmsgs</span>
      </a>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="nav-right">
      <button class="btn-ghost" onclick="logOut()">Log Out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Admin Panel</h1>
      <div class="accent-line"></div>
      <p>Manage approvals, review the message log, and export audit data.</p>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" id="stat-pending">—</div><div class="stat-lbl">Pending Users</div></div>
      <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Messages</div></div>
      <div class="stat"><div class="stat-val" id="stat-approved">—</div><div class="stat-lbl">Approved</div></div>
      <div class="stat"><div class="stat-val" id="stat-posted">—</div><div class="stat-lbl">Posted to Insta</div></div>
    </div>

    <!-- Pending Approvals -->
    <div class="section">
      <div class="section-head">
        <h2>Pending Approvals</h2>
        <span id="pending-count">—</span>
      </div>
      <div class="user-list" id="pending-users">
        <p class="empty-state">Loading...</p>
      </div>
    </div>

    <!-- Message Log -->
    <div class="section">
      <div class="section-head">
        <h2>Message Log</h2>
        <button class="btn-csv" onclick="downloadCSV()">⬇ Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Message</th>
              <th>Status</th>
              <th>Insta</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="message-tbody">
            <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient('https://YOUR-PROJECT.supabase.co', 'YOUR-ANON-KEY');
    let allMessages = [];

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', session.user.id).single();
      if (!profile?.is_admin) { window.location.href = 'dashboard.html'; return; }
      loadPending();
      loadMessages();
    })();

    async function loadPending() {
      const { data } = await sb.from('profiles').select('id,email,created_at').eq('is_approved', false).order('created_at');
      document.getElementById('pending-count').textContent = `${(data||[]).length} waiting`;
      document.getElementById('stat-pending').textContent = (data||[]).length;
      const el = document.getElementById('pending-users');
      if (!data?.length) { el.innerHTML = '<p class="empty-state">No pending approvals 🎉</p>'; return; }
      el.innerHTML = data.map(u => `
        <div class="user-row">
          <div class="user-info">
            <span class="user-email-txt">${u.email}</span>
            <span class="user-date">Joined ${new Date(u.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
          </div>
          <button class="btn-approve" onclick="approveUser('${u.id}')">Approve</button>
        </div>`).join('');
    }

    async function approveUser(id) {
      await sb.from('profiles').update({ is_approved: true }).eq('id', id);
      loadPending();
    }

    async function loadMessages() {
      const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false }).limit(100);
      allMessages = data || [];
      const approved = allMessages.filter(m => m.moderation_status === 'approved').length;
      const posted   = allMessages.filter(m => m.posted_to_insta).length;
      document.getElementById('stat-total').textContent    = allMessages.length;
      document.getElementById('stat-approved').textContent = approved;
      document.getElementById('stat-posted').textContent   = posted;

      const tbody = document.getElementById('message-tbody');
      if (!allMessages.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">No messages yet.</td></tr>'; return; }
      tbody.innerHTML = allMessages.map(m => `
        <tr>
          <td>${m.user_email}</td>
          <td><div class="msg-text" title="${m.message_text.replace(/"/g,'&quot;')}">${m.message_text}</div></td>
          <td><span class="pill pill-${m.moderation_status}">${m.moderation_status}</span></td>
          <td>${m.posted_to_insta ? '<span class="pill pill-posted">Posted</span>' : '<span style="color:var(--muted);font-size:12px;">—</span>'}</td>
          <td style="color:var(--muted);white-space:nowrap;">${new Date(m.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
        </tr>`).join('');
    }

    function downloadCSV() {
      const header = ['email','message','submitted_at','moderation_status','posted_to_instagram'];
      const rows   = allMessages.map(m => [
        m.user_email,
        `"${m.message_text.replace(/"/g,'""')}"`,
        m.created_at,
        m.moderation_status,
        m.posted_to_insta
      ]);
      const csv  = [header, ...rows].map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `bhhsmsgs-log-${new Date().toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }

    async function logOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }
  </script>
</body>
</html>
